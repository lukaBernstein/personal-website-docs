<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUKA BERNSTEIN | RESUME</title>
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://yourwebsite.com/">
    <meta property="og:title" content="LUKA BERNSTEIN | RESUME">
    <meta property="og:description" content="Personal statement and portfolio of Luka Bernstein.">
    <meta property="og:image" content="https://github.com/lukaBernstein/Luka-s-Site/blob/main/LukaSuit.png?raw=true">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⭐</text></svg>">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/simplex-noise@2.4.0/simplex-noise.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Pathway+Gothic+One&display=swap');
        body { margin: 0; background: #000; overflow: hidden; cursor: crosshair; }
        canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; display: block; }
        #transition-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: black; z-index: 200; pointer-events: none; opacity: 0; }
        #crawl-container { display: none; opacity: 0; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 100; pointer-events: none; color: #FEDA4A; font-family: "Pathway Gothic One", sans-serif; text-transform: uppercase; }
        .fade { position: absolute; top: 0; width: 100%; height: 55vh; background-image: linear-gradient(to top, rgba(0,0,0,0) 0%, rgba(0,0,0,1) 100%); z-index: 110; }
        .star-wars-stage { display: flex; justify-content: center; position: relative; height: 100vh; width: 100vw; perspective: 3100px; perspective-origin: 50% 50%; }
        .crawl-plane { position: absolute; width: 80%; max-width: 650px; height: 18000px; top: 0; transform: rotateX(65deg); transform-origin: 50% 0%; }
        .crawl-content { position: absolute; top: 200vh; width: 100%; text-align: justify; text-justify: inter-word; font-size: 2.8rem; line-height: 1.3; hyphens: auto; word-break: break-word; overflow-wrap: break-word; }
        .crawl-active .crawl-content { animation: scroll-up 240s linear forwards; }
        .title { text-align: center; margin-bottom: 250px; }
        .title p { font-size: 1.8rem; margin: 0 0 10px; letter-spacing: 0.15em; }
        .title h1 { font-size: 6.5rem; margin: 0; letter-spacing: 0.02em; transform: scaleY(1.35); }
        @keyframes scroll-up { 0% { top: 185vh; } 100% { top: -15000px; } }
        @media screen and (max-width: 768px) {
            .star-wars-stage { perspective: 3000px; perspective-origin: 50% 100%; }
            .crawl-plane { width: 100%; transform: rotateX(70deg) translateZ(-500px); }
            .crawl-content { font-size: 2.2rem; width: 90%; left: 50%; transform: translateX(-50%); }
            .title h1 { font-size: 2.8rem; }
            @keyframes scroll-up-mobile { 0% { top: 115vh; transform: translateX(-50%) scale(1); } 100% { top: -15000px; transform: translateX(-50%) scale(0.4); } }
            .crawl-active .crawl-content { animation: scroll-up-mobile 140s linear forwards; }
        }
    </style>
</head>
<body>
    <div id="transition-overlay"></div>
    <div id="crawl-container">
        <div class="fade"></div>
        <div class="star-wars-stage">
            <div class="crawl-plane">
                <div class="crawl-content">
                    <div class="title"><p>A personal statement from</p><h1>LUKA BERNSTEIN</h1></div>
                    <p>Thank you for visiting my website! I hope you’ve enjoyed it thus far... [Content Truncated for Space]</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, clock, mainGroup, starGroup;
        let starMesh, tileMesh, namePlane, glowPlane, nameLight, sweepLight, artifact, nebula, buttonBox;
        let isWarping = false, arrived = false, isUnfolded = false, isSpelling = false, isCredits = false, isPanning = false, isTerrainMode = false;
        let panelGroup, panelReady = false, orbShaderMat;
        const mouse = new THREE.Vector2(-10, -10), raycaster = new THREE.Raycaster();
        const starCount = 8000; // Optimized count
        const starData = [];
        let warpAmount = { value: 0 };

        const isMobile = () => window.innerWidth < 768;

        function init() {
            clock = new THREE.Clock();
            scene = new THREE.Scene();
            mainGroup = new THREE.Group(); scene.add(mainGroup);
            starGroup = new THREE.Group(); scene.add(starGroup);
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 5000);
            camera.position.z = 10;
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            // --- INSTANCED STARS (REPLACES 12,000 SEPARATE MESHES) ---
            const starGeo = new THREE.SphereGeometry(0.1, 4, 4);
            const starMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            starMesh = new THREE.InstancedMesh(starGeo, starMat, starCount);
            const dummy = new THREE.Object3D();
            for (let i = 0; i < starCount; i++) {
                const x = (Math.random() - 0.5) * 600;
                const y = (Math.random() - 0.5) * 600;
                const z = Math.random() * -4000;
                dummy.position.set(x, y, z);
                dummy.updateMatrix();
                starMesh.setMatrixAt(i, dummy.matrix);
                starData.push({ x, y, z, speed: Math.random() * 2 + 1 });
            }
            starGroup.add(starMesh);

            // --- NAME & UI ---
            setupNameUI();
            setupGrid();
            setupOrbs();
            setupArtifact();
            createPanelButton();

            window.addEventListener('mousemove', (e) => { mouse.x = (e.clientX/window.innerWidth)*2-1; mouse.y = -(e.clientY/window.innerHeight)*2+1; });
            window.addEventListener('click', onClick);
            window.addEventListener('resize', onResize);
            animate();
        }

        function setupNameUI() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 2048; canvas.height = 512;
            ctx.font = '500 180px "Times New Roman"';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.shadowColor = '#ffcc00'; ctx.shadowBlur = 38;
            ctx.fillStyle = '#ffffff';
            ctx.fillText('LUKA BERNSTEIN', 1024, 256);
            
            namePlane = new THREE.Mesh(new THREE.PlaneGeometry(35, 10), new THREE.MeshStandardMaterial({ 
                map: new THREE.CanvasTexture(canvas), transparent: true, color: 0xffd966, emissive: 0xffaa00, emissiveIntensity: 0.45, opacity: 0 
            }));
            namePlane.position.z = 200; scene.add(namePlane);
            
            nameLight = new THREE.PointLight(0xffcc00, 0, 60); nameLight.position.set(0, 0, -4.5); scene.add(nameLight);
            sweepLight = new THREE.PointLight(0xffffff, 0, 45); sweepLight.position.set(-20, 10, -5); scene.add(sweepLight);
            
            gsap.to(namePlane.position, { z: -8, duration: 1.8, ease: "power4.out" });
            gsap.to(namePlane.material, { opacity: 1, duration: 1.2, delay: 0.2 });
            gsap.to(nameLight, { intensity: 280, duration: 2, delay: 0.5 });
        }

        function setupGrid() {
            const spacing = 0.65;
            const cols = 60, rows = 40;
            const total = cols * rows;
            const tileGeo = new THREE.BoxGeometry(0.35, 0.35, 0.07);
            const tileMat = new THREE.MeshStandardMaterial({ color: 0xffffff, transparent: true, opacity: 0.4, metalness: 0.8 });
            tileMesh = new THREE.InstancedMesh(tileGeo, tileMat, total);
            const dummy = new THREE.Object3D();
            let idx = 0;
            for(let x = -cols/2; x < cols/2; x++) {
                for(let y = -rows/2; y < rows/2; y++) {
                    dummy.position.set(x * spacing, y * spacing, 0);
                    dummy.updateMatrix();
                    tileMesh.setMatrixAt(idx++, dummy.matrix);
                }
            }
            scene.add(tileMesh);
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        }

        function setupOrbs() {
            const orbGroup = new THREE.Group();
            const colors = [0xff007b, 0x7000ff, 0xffd700, 0x00ffff];
            colors.forEach((c, i) => {
                const light = new THREE.PointLight(c, 200, 40);
                const geom = new THREE.SphereGeometry(0.5, 16, 16);
                const mat = new THREE.MeshBasicMaterial({ color: c });
                const mesh = new THREE.Mesh(geom, mat);
                const group = new THREE.Group();
                group.add(light, mesh);
                group.userData = { angle: i * (Math.PI/2), speed: 0.01 + (i*0.005) };
                mainGroup.add(group);
            });
        }

        function setupArtifact() {
            artifact = new THREE.Group();
            const geo = new THREE.DodecahedronGeometry(4, 0);
            const mat = new THREE.MeshPhysicalMaterial({ color: 0x222222, metalness: 1, roughness: 0.1, transparent: true, opacity: 0.8 });
            const mesh = new THREE.Mesh(geo, mat);
            artifact.add(mesh);
            artifact.position.z = -1500;
            artifact.visible = false;
            mainGroup.add(artifact);
        }

        function createPanelButton() {
            panelGroup = new THREE.Group();
            panelGroup.visible = false;
            const geo = new THREE.BoxGeometry(20, 3, 0.5);
            const mat = new THREE.MeshBasicMaterial({ color: 0x00ff41, wireframe: true });
            const mesh = new THREE.Mesh(geo, mat);
            panelGroup.add(mesh);
            camera.add(panelGroup);
            panelGroup.position.set(0, -5, -20);
        }

        function onClick() {
            if (!isWarping && raycaster.intersectObject(namePlane).length > 0) {
                isWarping = true;
                gsap.to(namePlane.material, { opacity: 0, duration: 1 });
                gsap.to(warpAmount, { value: 1, duration: 3, ease: "power2.in" });
                gsap.to(tileMesh.position, { z: 500, duration: 2 });
                setTimeout(() => {
                    arrived = true;
                    artifact.visible = true;
                    gsap.to(artifact.position, { z: -20, duration: 2 });
                }, 3000);
            }
            if (arrived && !isUnfolded) {
                isUnfolded = true;
                // Add unfolding logic...
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            // --- ANIMATE INSTANCED STARS ---
            const dummy = new THREE.Object3D();
            for (let i = 0; i < starCount; i++) {
                const s = starData[i];
                s.z += s.speed + (warpAmount.value * 100);
                if (s.z > 50) s.z = -4000;
                
                dummy.position.set(s.x, s.y, s.z);
                // Stretch effect during warp
                dummy.scale.set(1, 1, 1 + (warpAmount.value * 20));
                dummy.updateMatrix();
                starMesh.setMatrixAt(i, dummy.matrix);
            }
            starMesh.instanceMatrix.needsUpdate = true;

            // --- INTERACTIVE GRID ---
            if (!isWarping) {
                tileMesh.rotation.x = mouse.y * 0.05;
                tileMesh.rotation.y = mouse.x * 0.05;
            }

            raycaster.setFromCamera(mouse, camera);
            renderer.render(scene, camera);
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        init();
    </script>
</body>
</html>
